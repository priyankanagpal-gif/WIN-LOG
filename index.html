<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Win Log — Priyanka</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f4ef;
    --surface: #ffffff;
    --ink: #1a1a1a;
    --ink-muted: #888;
    --gold: #b8860b;
    --gold-light: #f5e9c8;
    --gold-mid: #d4a832;
    --win: #2d6a4f;
    --win-bg: #eaf4ee;
    --slip: #9b2335;
    --slip-bg: #fdeef0;
    --border: #e8e2d8;
    --radius: 2px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    min-height: 100vh;
  }

  .app { max-width: 680px; margin: 0 auto; padding: 0 20px 80px; }

  header {
    padding: 40px 0 28px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .brand {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.1;
  }

  .brand span {
    display: block;
    font-style: italic;
    font-weight: 400;
    font-size: 15px;
    color: var(--gold);
    margin-top: 2px;
  }

  .streak-badge { text-align: right; }

  .streak-num {
    font-family: 'Playfair Display', serif;
    font-size: 40px;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
  }

  .streak-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-top: 2px;
  }

  .date-nav {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 14px 18px;
  }

  .nav-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ink-muted);
    font-size: 18px;
    line-height: 1;
    padding: 4px 8px;
    transition: color 0.15s;
  }
  .nav-btn:hover { color: var(--gold); }

  .date-display { flex: 1; text-align: center; }

  .date-main {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--ink);
  }

  .date-sub {
    font-size: 11px;
    color: var(--ink-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 1px;
  }

  .today-btn {
    background: var(--gold-light);
    border: 1px solid var(--gold-mid);
    color: var(--gold);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .today-btn:hover { background: var(--gold-mid); color: white; }

  .log-form {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 24px;
    margin-bottom: 28px;
  }

  .form-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 10px;
    display: block;
  }

  .win-types {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }

  .win-type-btn {
    padding: 14px 12px;
    border: 1.5px solid var(--border);
    background: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--ink-muted);
    text-align: left;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .win-type-btn .icon { font-size: 18px; }

  .win-type-btn.selected-win {
    border-color: var(--win);
    background: var(--win-bg);
    color: var(--win);
    font-weight: 500;
  }

  .win-type-btn.selected-slip {
    border-color: var(--slip);
    background: var(--slip-bg);
    color: var(--slip);
    font-weight: 500;
  }

  .win-type-btn:hover:not(.selected-win):not(.selected-slip) {
    border-color: var(--ink-muted);
    color: var(--ink);
  }

  .note-input {
    width: 100%;
    border: 1.5px solid var(--border);
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--ink);
    padding: 12px 14px;
    resize: none;
    outline: none;
    transition: border-color 0.15s;
    margin-bottom: 14px;
  }

  .note-input:focus { border-color: var(--gold-mid); }
  .note-input::placeholder { color: var(--ink-muted); }

  .triggers {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 16px;
  }

  .trigger-chip {
    padding: 5px 12px;
    border: 1px solid var(--border);
    background: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--ink-muted);
    cursor: pointer;
    border-radius: 20px;
    transition: all 0.15s;
  }

  .trigger-chip.active {
    background: var(--gold-light);
    border-color: var(--gold-mid);
    color: var(--gold);
  }

  .save-btn {
    width: 100%;
    background: var(--ink);
    color: white;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 14px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .save-btn:hover { background: var(--gold); }

  .day-summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 28px;
  }

  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 16px;
    text-align: center;
  }

  .summary-num {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 700;
    line-height: 1;
  }

  .summary-num.wins { color: var(--win); }
  .summary-num.slips { color: var(--slip); }
  .summary-num.score { color: var(--gold); }

  .summary-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-top: 4px;
  }

  .entries-header {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .clear-day-btn {
    background: none;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    color: var(--ink-muted);
    cursor: pointer;
    text-decoration: underline;
  }
  .clear-day-btn:hover { color: var(--slip); }

  .entries-list { display: flex; flex-direction: column; gap: 8px; }

  .entry-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid transparent;
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .entry-card.win { border-left-color: var(--win); }
  .entry-card.slip { border-left-color: var(--slip); }

  .entry-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
  .entry-body { flex: 1; }

  .entry-type {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 3px;
  }

  .entry-card.win .entry-type { color: var(--win); }
  .entry-card.slip .entry-type { color: var(--slip); }

  .entry-note {
    font-size: 14px;
    color: var(--ink);
    line-height: 1.4;
    margin-bottom: 4px;
  }

  .entry-meta { display: flex; gap: 8px; flex-wrap: wrap; }

  .entry-time {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--ink-muted);
  }

  .entry-trigger {
    font-size: 11px;
    color: var(--gold);
    background: var(--gold-light);
    padding: 1px 8px;
    border-radius: 10px;
  }

  .entry-delete {
    background: none;
    border: none;
    color: var(--border);
    cursor: pointer;
    font-size: 16px;
    padding: 0 4px;
    transition: color 0.15s;
    flex-shrink: 0;
  }
  .entry-delete:hover { color: var(--slip); }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    border: 1px dashed var(--border);
    color: var(--ink-muted);
  }

  .empty-state .empty-icon { font-size: 32px; margin-bottom: 10px; }
  .empty-state p { font-size: 14px; line-height: 1.5; }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ink);
    color: white;
    padding: 12px 24px;
    font-size: 13px;
    letter-spacing: 1px;
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 100;
    white-space: nowrap;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.gold { background: var(--gold); }

  .cal-strip {
    display: flex;
    gap: 6px;
    margin-bottom: 28px;
    overflow-x: auto;
    padding-bottom: 4px;
  }

  .cal-strip::-webkit-scrollbar { height: 2px; }
  .cal-strip::-webkit-scrollbar-track { background: var(--bg); }
  .cal-strip::-webkit-scrollbar-thumb { background: var(--border); }

  .cal-day {
    flex-shrink: 0;
    width: 44px;
    padding: 8px 4px;
    text-align: center;
    border: 1px solid var(--border);
    cursor: pointer;
    background: var(--surface);
    transition: all 0.15s;
  }

  .cal-day:hover { border-color: var(--gold-mid); }
  .cal-day.today { border-color: var(--gold-mid); background: var(--gold-light); }
  .cal-day.selected { border-color: var(--ink); background: var(--ink); }
  .cal-day.selected .cal-d, .cal-day.selected .cal-wd { color: white; }
  .cal-day.has-wins { border-bottom: 2px solid var(--win); }
  .cal-day.has-slips { border-bottom: 2px solid var(--slip); }
  .cal-day.has-both { border-bottom: 2px solid var(--gold-mid); }

  .cal-wd {
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 3px;
  }

  .cal-d {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1;
  }

  .cal-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    margin: 4px auto 0;
    background: transparent;
  }

  .cal-day.has-wins .cal-dot { background: var(--win); }
  .cal-day.has-slips .cal-dot { background: var(--slip); }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="header-top">
      <div class="brand">
        Win Log
        <span>Subconscious Reprogramming</span>
      </div>
      <div class="streak-badge">
        <div class="streak-num" id="streakNum">0</div>
        <div class="streak-label">Day Streak 🔥</div>
      </div>
    </div>
  </header>

  <div class="cal-strip" id="calStrip"></div>

  <div class="date-nav">
    <button class="nav-btn" id="prevDay">&#8592;</button>
    <div class="date-display">
      <div class="date-main" id="dateMain"></div>
      <div class="date-sub" id="dateSub"></div>
    </div>
    <button class="today-btn" id="todayBtn">Today</button>
    <button class="nav-btn" id="nextDay">&#8594;</button>
  </div>

  <div class="day-summary">
    <div class="summary-card">
      <div class="summary-num wins" id="summaryWins">0</div>
      <div class="summary-label">Wins</div>
    </div>
    <div class="summary-card">
      <div class="summary-num slips" id="summarySlips">0</div>
      <div class="summary-label">Slips</div>
    </div>
    <div class="summary-card">
      <div class="summary-num score" id="summaryScore">—</div>
      <div class="summary-label">Score</div>
    </div>
  </div>

  <div class="log-form">
    <label class="form-label">Log a moment</label>
    <div class="win-types">
      <button class="win-type-btn selected-win" data-type="win" id="btnWin">
        <span class="icon">💪</span> I resisted
      </button>
      <button class="win-type-btn" data-type="slip" id="btnSlip">
        <span class="icon">⚡</span> I slipped — caught it
      </button>
      <button class="win-type-btn" data-type="strong" id="btnStrong">
        <span class="icon">🏆</span> Major win
      </button>
      <button class="win-type-btn" data-type="aware" id="btnAware">
        <span class="icon">🧠</span> I was aware
      </button>
    </div>

    <textarea class="note-input" id="noteInput" rows="2" placeholder="What happened? What did you feel?"></textarea>

    <label class="form-label">Trigger (optional)</label>
    <div class="triggers">
      <button class="trigger-chip" data-trigger="Boredom">Boredom</button>
      <button class="trigger-chip" data-trigger="Social pressure">Social pressure</button>
      <button class="trigger-chip" data-trigger="Stress">Stress</button>
      <button class="trigger-chip" data-trigger="Habit">Habit</button>
      <button class="trigger-chip" data-trigger="Emotions">Emotions</button>
      <button class="trigger-chip" data-trigger="Sight of food">Sight of food</button>
    </div>

    <button class="save-btn" id="saveBtn">Log This Moment</button>
  </div>

  <div class="entries-header">
    <span id="entriesLabel">Today's Log</span>
    <button class="clear-day-btn" id="clearDayBtn">Clear day</button>
  </div>
  <div class="entries-list" id="entriesList"></div>

</div>

<div class="toast" id="toast"></div>

<script>
  // ── State ──────────────────────────────────────────────
  let selectedDate = todayKey();
  let selectedType = 'win';
  let selectedTrigger = null;
  let allData = {};

  const STORAGE_KEY = 'winlog_priyanka_v1';

  // ── localStorage (works on GitHub Pages) ──────────────
  function loadAll() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      allData = raw ? JSON.parse(raw) : {};
    } catch(e) { allData = {}; }
  }

  function saveAll() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(allData));
    } catch(e) { console.error('Storage error', e); }
  }

  // ── Date helpers ───────────────────────────────────────
  function todayKey() {
    return new Date().toISOString().slice(0, 10);
  }

  function parseDate(key) {
    const [y, m, d] = key.split('-').map(Number);
    return new Date(y, m - 1, d);
  }

  function formatKey(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

  function formatDisplay(key) {
    const d = parseDate(key);
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    return {
      main: `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`,
      sub: days[d.getDay()]
    };
  }

  function shiftDate(key, delta) {
    const d = parseDate(key);
    d.setDate(d.getDate() + delta);
    return formatKey(d);
  }

  // ── Render ─────────────────────────────────────────────
  function render() {
    renderDateNav();
    renderCalStrip();
    renderSummary();
    renderEntries();
    renderStreak();
  }

  function renderDateNav() {
    const { main, sub } = formatDisplay(selectedDate);
    document.getElementById('dateMain').textContent = main;
    document.getElementById('dateSub').textContent = sub;
    const nextBtn = document.getElementById('nextDay');
    const isToday = selectedDate >= todayKey();
    nextBtn.style.opacity = isToday ? '0.3' : '1';
    nextBtn.disabled = isToday;

    const label = selectedDate === todayKey() ? "Today's Log" : formatDisplay(selectedDate).main + " Log";
    document.getElementById('entriesLabel').textContent = label;
  }

  function renderCalStrip() {
    const strip = document.getElementById('calStrip');
    strip.innerHTML = '';
    const wds = ['Su','Mo','Tu','We','Th','Fr','Sa'];
    for (let i = 13; i >= 0; i--) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      const key = formatKey(d);
      const entries = allData[key] || [];
      const wins = entries.filter(e => e.type === 'win' || e.type === 'strong').length;
      const slips = entries.filter(e => e.type === 'slip').length;

      const el = document.createElement('div');
      el.className = 'cal-day';
      if (key === todayKey()) el.classList.add('today');
      if (key === selectedDate) el.classList.add('selected');
      if (entries.length > 0) {
        if (wins > 0 && slips > 0) el.classList.add('has-both');
        else if (wins > 0) el.classList.add('has-wins');
        else if (slips > 0) el.classList.add('has-slips');
      }

      el.innerHTML = `
        <div class="cal-wd">${wds[d.getDay()]}</div>
        <div class="cal-d">${d.getDate()}</div>
        <div class="cal-dot"></div>
      `;
      el.addEventListener('click', () => { selectedDate = key; render(); });
      strip.appendChild(el);
    }
    strip.scrollLeft = strip.scrollWidth;
  }

  function renderSummary() {
    const entries = allData[selectedDate] || [];
    const wins = entries.filter(e => e.type === 'win' || e.type === 'strong' || e.type === 'aware').length;
    const slips = entries.filter(e => e.type === 'slip').length;
    const total = wins + slips;
    const score = total === 0 ? '—' : Math.round((wins / total) * 100) + '%';

    document.getElementById('summaryWins').textContent = wins;
    document.getElementById('summarySlips').textContent = slips;
    document.getElementById('summaryScore').textContent = score;
  }

  function renderEntries() {
    const list = document.getElementById('entriesList');
    const entries = (allData[selectedDate] || []).slice().reverse();

    if (entries.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📋</div>
          <p>No moments logged for this day.<br>Every win — big or small — deserves to be recorded.</p>
        </div>`;
      return;
    }

    list.innerHTML = '';
    entries.forEach((entry, idx) => {
      const realIdx = (allData[selectedDate] || []).length - 1 - idx;
      const icons = { win: '💪', slip: '⚡', strong: '🏆', aware: '🧠' };
      const labels = { win: 'Resisted', slip: 'Slipped — caught it', strong: 'Major Win', aware: 'Awareness' };
      const cardClass = entry.type === 'slip' ? 'slip' : 'win';

      const card = document.createElement('div');
      card.className = `entry-card ${cardClass}`;
      card.innerHTML = `
        <div class="entry-icon">${icons[entry.type] || '✓'}</div>
        <div class="entry-body">
          <div class="entry-type">${labels[entry.type] || entry.type}</div>
          ${entry.note ? `<div class="entry-note">${entry.note}</div>` : ''}
          <div class="entry-meta">
            <span class="entry-time">${entry.time}</span>
            ${entry.trigger ? `<span class="entry-trigger">${entry.trigger}</span>` : ''}
          </div>
        </div>
        <button class="entry-delete" data-idx="${realIdx}" title="Delete">×</button>
      `;
      list.appendChild(card);
    });

    list.querySelectorAll('.entry-delete').forEach(btn => {
      btn.addEventListener('click', () => {
        const i = parseInt(btn.dataset.idx);
        allData[selectedDate].splice(i, 1);
        if (allData[selectedDate].length === 0) delete allData[selectedDate];
        saveAll();
        render();
      });
    });
  }

  function renderStreak() {
    let streak = 0;
    const d = new Date();
    while (true) {
      const key = formatKey(d);
      const entries = allData[key] || [];
      const hasWin = entries.some(e => e.type === 'win' || e.type === 'strong' || e.type === 'aware');
      if (!hasWin) break;
      streak++;
      d.setDate(d.getDate() - 1);
    }
    document.getElementById('streakNum').textContent = streak;
  }

  // ── Type selector ──────────────────────────────────────
  document.querySelectorAll('.win-type-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedType = btn.dataset.type;
      document.querySelectorAll('.win-type-btn').forEach(b => {
        b.classList.remove('selected-win', 'selected-slip');
      });
      btn.classList.add(selectedType === 'slip' ? 'selected-slip' : 'selected-win');
    });
  });

  // ── Trigger chips ──────────────────────────────────────
  document.querySelectorAll('.trigger-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      if (selectedTrigger === chip.dataset.trigger) {
        selectedTrigger = null;
        chip.classList.remove('active');
      } else {
        document.querySelectorAll('.trigger-chip').forEach(c => c.classList.remove('active'));
        selectedTrigger = chip.dataset.trigger;
        chip.classList.add('active');
      }
    });
  });

  // ── Save ───────────────────────────────────────────────
  document.getElementById('saveBtn').addEventListener('click', () => {
    const note = document.getElementById('noteInput').value.trim();
    const now = new Date();
    const time = now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });

    const entry = {
      type: selectedType,
      note,
      trigger: selectedTrigger,
      time,
      ts: now.getTime()
    };

    // Always save to today's date
    const key = todayKey();
    if (!allData[key]) allData[key] = [];
    allData[key].push(entry);
    saveAll();

    // Jump to today to show new entry
    selectedDate = key;

    // Reset form
    document.getElementById('noteInput').value = '';
    selectedTrigger = null;
    document.querySelectorAll('.trigger-chip').forEach(c => c.classList.remove('active'));

    const msg = selectedType === 'strong' ? '🏆 Major win logged!'
               : selectedType === 'slip'   ? '⚡ Logged — awareness is progress'
               : '💪 Win logged!';
    showToast(msg, selectedType === 'strong');
    render();
  });

  // ── Nav ────────────────────────────────────────────────
  document.getElementById('prevDay').addEventListener('click', () => {
    selectedDate = shiftDate(selectedDate, -1);
    render();
  });

  document.getElementById('nextDay').addEventListener('click', () => {
    if (selectedDate < todayKey()) {
      selectedDate = shiftDate(selectedDate, 1);
      render();
    }
  });

  document.getElementById('todayBtn').addEventListener('click', () => {
    selectedDate = todayKey();
    render();
  });

  document.getElementById('clearDayBtn').addEventListener('click', () => {
    if (!allData[selectedDate] || allData[selectedDate].length === 0) return;
    if (confirm('Clear all entries for this day?')) {
      delete allData[selectedDate];
      saveAll();
      render();
      showToast('Day cleared');
    }
  });

  // ── Toast ──────────────────────────────────────────────
  function showToast(msg, isGold = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isGold ? ' gold' : '');
    setTimeout(() => { t.className = 'toast'; }, 2500);
  }

  // ── Init ───────────────────────────────────────────────
  loadAll();
  render();
</script>
</body>
</html>
